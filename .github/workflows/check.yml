# The same gate developers run locally: `bun run check` = typecheck (tsgo),
# lint (oxlint --type-aware), format:check (oxfmt), bun test (100% line+function
# coverage enforced via bunfig.toml), and the wxt production build.
# convex/_generated is committed, so no Convex CLI or deployment is needed here.
name: check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # bun.lock is lockfileVersion 2, written by the local bun 1.4.0 canary; no
      # stable release parses it yet (1.3.14 fails, and setup-bun 404s on "1.4.0"
      # because canaries have no GitHub release). Track canary until 1.4.0 ships,
      # then pin it here.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: canary
      - run: bun install --frozen-lockfile
      - run: bun run check

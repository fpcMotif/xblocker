<!doctype html>
<!-- PROTOTYPE — throwaway. Answers: which motion personality for the Reply Rail
     (spec: docs/superpowers/specs/2026-06-12-reply-rail-design.md).
     Three variants on ?variant= : A Glide, B Spring, C Magnetic rows.
     Run: open prototypes/reply-rail-prototype.html -->
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Reply Rail prototype</title>
<style>
  :root {
    --surface: oklch(18% 0.02 251);
    --elevated: oklch(28.4% 0.025 249);
    --ink: oklch(96.2% 0.009 248);
    --muted: oklch(70% 0.015 248);
    --border: oklch(96.2% 0.009 248 / 0.14);
    --primary: oklch(63% 0.16 246);
    --danger: oklch(60.1% 0.212 21);
    --success: oklch(64.6% 0.152 154);
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--surface); color: var(--ink);
    font: 15px/1.45 -apple-system, "Segoe UI", sans-serif; }
  .col { max-width: 600px; margin: 0 auto; border-inline: 1px solid var(--border); min-height: 100vh; }
  .tweet { padding: 16px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; position: relative; }
  .av { width: 40px; height: 40px; border-radius: 50%; flex: none; display: flex;
    align-items: center; justify-content: center; font-weight: 600; font-size: 14px; color: #fff; }
  .name { font-weight: 700; } .handle { color: var(--muted); font-size: 13px; }
  .main .txt { font-size: 19px; margin-top: 6px; }
  .acts { display: flex; gap: 48px; color: var(--muted); font-size: 13px; margin-top: 10px; }
  .veil { position: absolute; inset: 0; background: oklch(18% 0.02 251 / 0.55);
    display: none; align-items: center; justify-content: center; }
  .veil span { background: var(--elevated); border: 1px solid var(--border); border-radius: 999px;
    padding: 4px 12px; font-size: 13px; }
  .tweet.blocked .veil, .tweet.muted .veil { display: flex; }
  .tweet.blocked > :not(.veil), .tweet.muted > :not(.veil) { opacity: 0.35; }

  #rail { position: fixed; left: 0; top: 0; z-index: 50; will-change: transform; }
  #stack { width: 48px; background: var(--elevated); border: 1.5px solid var(--border);
    border-radius: 14px; padding: 6px 0; display: flex; flex-direction: column; align-items: center;
    gap: 4px; box-shadow: 0 8px 24px oklch(0% 0 0 / 0.35);
    transition: border-color 160ms, opacity 160ms, transform 160ms; transform-origin: top right; }
  #rail.collapsed #stack { opacity: 0; transform: scale(0.4); pointer-events: none; position: absolute; }
  #handle { width: 36px; height: 36px; border-radius: 50%; background: var(--elevated);
    border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; cursor: pointer; transition: opacity 160ms, transform 160ms;
    box-shadow: 0 4px 14px oklch(0% 0 0 / 0.35); user-select: none; }
  #rail:not(.collapsed) #handle { opacity: 0; transform: scale(0.4); pointer-events: none; position: absolute; }
  #rail.settled #stack { border-color: var(--primary); }
  #pin { position: absolute; top: -4px; right: -4px; width: 10px; height: 10px; border-radius: 50%;
    background: var(--primary); opacity: 0; transition: opacity 120ms; }
  #rail.settled #pin { opacity: 1; }
  .rbtn { width: 36px; height: 36px; border-radius: 10px; border: 0; background: transparent;
    color: var(--ink); cursor: pointer; display: flex; align-items: center; justify-content: center;
    position: relative; }
  .rbtn:hover { background: oklch(96.2% 0.009 248 / 0.1); }
  .rbtn:active { transform: scale(0.94); }
  .rbtn.danger { color: var(--danger); }
  .rbtn svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2;
    stroke-linecap: round; stroke-linejoin: round; }
  .cnt { position: absolute; bottom: 1px; right: 2px; font-size: 9px; font-weight: 700;
    color: var(--muted); }
  .div { width: 24px; height: 1px; background: var(--border); margin: 2px 0; }
  .ring { position: relative; width: 36px; height: 36px; display: flex; align-items: center;
    justify-content: center; }
  .ring svg { position: absolute; inset: 2px; transform: rotate(-90deg); }
  .ring .track { stroke: var(--border); } .ring .bar { stroke: var(--success); transition: stroke-dashoffset 180ms; }
  .ring span { font-size: 11px; font-weight: 700; }

  #debug { position: fixed; top: 10px; left: 10px; z-index: 60; background: oklch(0% 0 0 / 0.6);
    border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px;
    font: 11px/1.6 ui-monospace, monospace; color: var(--muted); pointer-events: none; }
  #debug b { color: var(--ink); }
  #dwellbar { width: 120px; height: 3px; background: var(--border); border-radius: 2px; margin-top: 4px; }
  #dwellfill { height: 100%; width: 0; background: var(--primary); border-radius: 2px; }

  #switcher { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 70;
    background: #fff; color: #111; border-radius: 999px; padding: 6px 10px; display: flex;
    align-items: center; gap: 10px; font-size: 13px; font-weight: 600;
    box-shadow: 0 6px 20px oklch(0% 0 0 / 0.5); }
  #switcher button { border: 0; background: #eee; border-radius: 50%; width: 26px; height: 26px;
    cursor: pointer; font-size: 13px; }
  #toast { position: fixed; bottom: 64px; left: 50%; transform: translateX(-50%); z-index: 70;
    background: var(--elevated); border: 1px solid var(--border); border-radius: 999px;
    padding: 6px 14px; font-size: 13px; opacity: 0; transition: opacity 200ms; pointer-events: none; }
</style>
</head>
<body>
<div class="col">
  <div class="tweet main">
    <div class="av" style="background:#5b6dd6">OP</div>
    <div>
      <span class="name">Original Poster</span> <span class="handle">@original_poster</span>
      <div class="txt">Hot take: cursor-following UI is unclickable by construction. You can never catch what runs from you.</div>
      <div class="acts"><span>💬 482</span><span>🔁 1.2K</span><span>❤️ 8.4K</span></div>
    </div>
  </div>
  <div id="replies"></div>
</div>

<div id="rail" class="collapsed">
  <div id="handle">0</div>
  <div id="stack">
    <div id="pin"></div>
    <button class="rbtn" id="dragH" title="Drag to move">
      <svg viewBox="0 0 24 24"><path d="M4 8h16M4 12h16M4 16h16"/></svg></button>
    <div class="div"></div>
    <button class="rbtn danger" id="blockB" title="Block all replies">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M5.6 5.6l12.8 12.8"/></svg>
      <span class="cnt" id="blockCnt"></span></button>
    <button class="rbtn" id="muteB" title="Mute all replies">
      <svg viewBox="0 0 24 24"><path d="M11 5L6 9H3v6h3l5 4zM16 9l5 6M21 9l-5 6"/></svg>
      <span class="cnt" id="muteCnt"></span></button>
    <button class="rbtn" id="wlB" title="Whitelist">
      <svg viewBox="0 0 24 24"><path d="M12 3l8 4v5c0 5-3.5 8-8 9-4.5-1-8-4-8-9V7z"/><path d="M9 12l2 2 4-4"/></svg></button>
    <div class="div"></div>
    <div class="ring" title="Blocked this session">
      <svg viewBox="0 0 24 24"><circle class="track" cx="12" cy="12" r="10" fill="none" stroke-width="2"/>
        <circle class="bar" id="ringBar" cx="12" cy="12" r="10" fill="none" stroke-width="2"
          stroke-linecap="round" stroke-dasharray="62.83" stroke-dashoffset="62.83"/></svg>
      <span id="sess">0</span>
    </div>
    <button class="rbtn" id="setB" title="Settings">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 00-.1-1.2l2-1.6-2-3.4-2.4 1a7 7 0 00-2-1.2L14 3h-4l-.4 2.6a7 7 0 00-2 1.2l-2.5-1-2 3.4 2 1.6a7 7 0 000 2.4l-2 1.6 2 3.4 2.4-1a7 7 0 002 1.2L10 21h4l.4-2.6a7 7 0 002-1.2l2.5 1 2-3.4-2-1.6c.06-.4.1-.8.1-1.2z"/></svg></button>
  </div>
</div>

<div id="debug">state <b id="dState">collapsed</b> · variant <b id="dVar"></b><br/>
  dwell <b id="dDwell">—</b> · y <b id="dY">0</b><div id="dwellbar"><div id="dwellfill"></div></div></div>
<div id="switcher"><button id="prevV">◀</button><span id="vLabel"></span><button id="nextV">▶</button></div>
<div id="toast"></div>

<script>
const NAMES = ["Ava Chen","Bot4Crypto","Casey Lim","DripLord","Elliot Wu","FarmFollow","Gia Park","HypeReply","Iris Nolan","JpegShill","Kofi Mensah","LinkSpammer"];
const TEXTS = [
  "This is exactly why I switched to keyboard nav.",
  "🚀🚀 CHECK MY PROFILE FOR FREE CRYPTO 🚀🚀",
  "Counterpoint: magnetic snapping fixes this.",
  "follow me i follow back instantly!!",
  "There's a classic Amazon menu trick for this — safe triangles.",
  "DM me for promo rates 📩📩",
  "Honestly the 1s dwell idea is clever.",
  "ratio + L + didn't ask",
  "Fitts's law would like a word.",
  "click my bio link for exclusive content 😏",
  "We shipped something similar at work, works great.",
  "🎁 GIVEAWAY: RT and follow to win 🎁"];
const COLORS = ["#d65b8a","#5bd6a2","#d6a25b","#8a5bd6","#5ba2d6","#d65b5b"];
const repliesEl = document.getElementById("replies");
NAMES.forEach((n, i) => {
  const d = document.createElement("div");
  d.className = "tweet reply";
  d.innerHTML = `<div class="av" style="background:${COLORS[i % 6]}">${n[0]}${n.split(/(?=[A-Z])/).at(-1)[0]}</div>
    <div><span class="name">${n}</span> <span class="handle">@${n.toLowerCase().replace(/\s/g, "_")}</span>
    <div class="txt">${TEXTS[i]}</div>
    <div class="acts"><span>💬 ${3 + i}</span><span>🔁 ${i}</span><span>❤️ ${12 * (i + 1)}</span></div></div>
    <div class="veil"><span></span></div>`;
  repliesEl.appendChild(d);
});

const rail = document.getElementById("rail");
const stack = document.getElementById("stack");
const handle = document.getElementById("handle");
const $ = (id) => document.getElementById(id);

const VARIANTS = { A: "Glide", B: "Spring", C: "Magnetic rows" };
let variant = new URLSearchParams(location.search).get("variant");
if (!VARIANTS[variant]) variant = "A";

const RAIL_W = 48, MARGIN = 8, DWELL_MS = 1000, JITTER = 4, COLLAPSE_MS = 600;
let state = "collapsed";           // collapsed | tracking | settled
let cursor = { x: -1, y: -1 };
let lastMove = performance.now(), anchor = { x: -1, y: -1 };
let homeX = 0, homeY = 0, homeInit = false;
let pos = { x: 0, y: 0 }, vel = 0;
function ensureHome() {
  if (homeInit || innerWidth === 0) return;
  homeX = innerWidth - RAIL_W - 24; homeY = innerHeight * 0.3;
  pos = { x: homeX, y: homeY }; homeInit = true;
}
let collapseTimer = null, overRail = false, dragging = false, batchRunning = false;
let session = 0;

function railH() { return state === "collapsed" ? 36 : stack.offsetHeight || 280; }
function clampY(y) { return Math.min(Math.max(y, MARGIN), innerHeight - railH() - MARGIN); }
function inReplies(x, y) {
  const r = repliesEl.getBoundingClientRect();
  return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
}
function rowCenterAt(y) {
  for (const el of repliesEl.children) {
    const r = el.getBoundingClientRect();
    if (y >= r.top && y <= r.bottom) return r.top + r.height / 2;
  }
  return y;
}
function setState(s) {
  state = s;
  rail.classList.toggle("collapsed", s === "collapsed");
  rail.classList.toggle("settled", s === "settled");
  $("dState").textContent = s;
}
function targetY() {
  if (state === "collapsed") return homeY;
  if (state === "settled") return pos.y;
  const want = variant === "C" ? rowCenterAt(cursor.y) - railH() / 2 : cursor.y - railH() / 2;
  return clampY(want);
}

document.addEventListener("mousemove", (e) => {
  cursor = { x: e.clientX, y: e.clientY };
  if (dragging) return;
  const moved = Math.hypot(cursor.x - anchor.x, cursor.y - anchor.y) > JITTER;
  if (moved) { anchor = { ...cursor }; lastMove = performance.now(); }
  overRail = rail.contains(e.target);
  const inside = inReplies(cursor.x, cursor.y);

  if (overRail) { cancelCollapse(); if (state !== "collapsed") setState("settled"); return; }
  if (inside) {
    cancelCollapse();
    if (batchRunning) { setState("settled"); return; }
    if (state === "collapsed") { setState("tracking"); pos.y = clampY(cursor.y - railH() / 2); }
    else if (state === "settled" && moved) setState("tracking");
  } else if (state !== "collapsed") {
    if (state === "tracking") setState("settled");   // leave-column freeze
    scheduleCollapse();
  }
});
function scheduleCollapse() {
  if (collapseTimer) return;
  collapseTimer = setTimeout(() => { collapseTimer = null; setState("collapsed"); }, COLLAPSE_MS);
}
function cancelCollapse() { clearTimeout(collapseTimer); collapseTimer = null; }
document.addEventListener("keydown", (e) => { if (e.key === "Escape") setState("collapsed"); });
document.addEventListener("scroll", () => {
  if (state !== "collapsed" && !inReplies(cursor.x, cursor.y) && !overRail) scheduleCollapse();
}, { passive: true });
handle.addEventListener("click", () => { setState("settled"); pos.y = clampY(pos.y); });

let last = performance.now();
function frame(now) {
  ensureHome();
  const dt = Math.min((now - last) / 1000, 0.05); last = now;
  if (state === "tracking" && now - lastMove >= DWELL_MS) setState("settled"); // dwell freeze
  const ty = targetY(), tx = state === "collapsed" ? homeX : Math.min(homeX, innerWidth - RAIL_W - MARGIN);
  if (!dragging) {
    pos.x += (tx - pos.x) * 0.2;
    if (variant === "B" && state === "tracking") {
      vel += (ty - pos.y) * 170 * dt; vel *= Math.exp(-13 * dt); pos.y += vel * dt;
    } else {
      vel = 0; pos.y += (ty - pos.y) * (variant === "C" ? 0.28 : 0.22);
    }
  }
  rail.style.transform = `translate3d(${pos.x}px, ${pos.y}px, 0)`;
  const dwellLeft = state === "tracking" ? Math.max(0, DWELL_MS - (now - lastMove)) : null;
  $("dDwell").textContent = dwellLeft === null ? "—" : Math.ceil(dwellLeft) + "ms";
  $("dwellfill").style.width = dwellLeft === null ? "0" : (100 - (dwellLeft / DWELL_MS) * 100) + "%";
  $("dY").textContent = Math.round(pos.y);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

const dragStart = (el, collapsedOnly) => el.addEventListener("pointerdown", (e) => {
  if (collapsedOnly && state !== "collapsed") return;
  dragging = true;
  const ox = e.clientX - pos.x, oy = e.clientY - pos.y;
  const move = (ev) => { pos.x = ev.clientX - ox; pos.y = ev.clientY - oy; };
  const up = () => {
    dragging = false; homeX = pos.x; homeY = pos.y;
    removeEventListener("pointermove", move); removeEventListener("pointerup", up);
  };
  addEventListener("pointermove", move); addEventListener("pointerup", up);
});
dragStart($("dragH")); dragStart(handle, true);

function toast(msg) {
  const t = $("toast"); t.textContent = msg; t.style.opacity = 1;
  clearTimeout(t._h); t._h = setTimeout(() => (t.style.opacity = 0), 1600);
}
function updateCounts() {
  $("blockCnt").textContent = repliesEl.querySelectorAll(".reply:not(.blocked)").length;
  $("muteCnt").textContent = repliesEl.querySelectorAll(".reply:not(.muted):not(.blocked)").length;
  handle.textContent = session; $("sess").textContent = session;
}
function runBatch(kind) {
  if (batchRunning) return;
  const targets = [...repliesEl.querySelectorAll(`.reply:not(.blocked)${kind === "muted" ? ":not(.muted)" : ""}`)];
  if (!targets.length) return toast("Nothing to do");
  batchRunning = true; setState("settled");
  targets.forEach((el, i) => setTimeout(() => {
    el.classList.add(kind);
    el.querySelector(".veil span").textContent =
      (kind === "blocked" ? "Blocked " : "Muted ") + el.querySelector(".handle").textContent;
    if (kind === "blocked") session++;
    $("ringBar").style.strokeDashoffset = 62.83 * (1 - (i + 1) / targets.length);
    updateCounts();
    if (i === targets.length - 1) {
      batchRunning = false;
      setTimeout(() => ($("ringBar").style.strokeDashoffset = 62.83), 500);
      toast(`${kind === "blocked" ? "Blocked" : "Muted"} ${targets.length} replies`);
    }
  }, i * 220));
}
$("blockB").addEventListener("click", () => runBatch("blocked"));
$("muteB").addEventListener("click", () => runBatch("muted"));
$("wlB").addEventListener("click", () => toast("Whitelist modal — prototype stub"));
$("setB").addEventListener("click", () => toast("Settings — prototype stub"));
updateCounts();

const keys = Object.keys(VARIANTS);
function setVariant(v) {
  variant = v; vel = 0;
  $("vLabel").textContent = `${v} — ${VARIANTS[v]}`;
  $("dVar").textContent = `${v} ${VARIANTS[v]}`;
  try { history.replaceState(null, "", `?variant=${v}`); } catch { /* file:// blocks this */ }
}
function cycle(dir) { setVariant(keys[(keys.indexOf(variant) + dir + keys.length) % keys.length]); }
$("prevV").addEventListener("click", () => cycle(-1));
$("nextV").addEventListener("click", () => cycle(1));
document.addEventListener("keydown", (e) => {
  if (/INPUT|TEXTAREA/.test(document.activeElement.tagName)) return;
  if (e.key === "ArrowLeft") cycle(-1);
  if (e.key === "ArrowRight") cycle(1);
});
setVariant(variant);
</script>
</body>
</html>

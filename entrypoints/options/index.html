<html lang="en">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

         node_modules/wxt/dist/core/utils/building/find-entrypoints.mjs); this is what
         puts `options_ui.open_in_tab: true` in the built manifest so the popup's
         chrome.runtime.openOptionsPage() opens a full tab instead of a tiny dialog. -->

  </head>

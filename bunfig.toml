[test]
# Use happy-dom for fast DOM testing
preload = ["./test/setup.ts"]
# Goal: 100% coverage of the extension's own source. Reported via `bun test --coverage`.
# convex-sync.ts is excluded on purpose: it is a thin live-Convex I/O wrapper (it only
# constructs a ConvexHttpClient and forwards calls). Its one piece of real logic — the
# OutboxItem -> recordAction mapping — lives in blocked-store.ts (outboxItemToRecordArgs)
# and IS covered. Marking it here makes the exemption explicit, not accidental.
coverage = true
coverageReporter = ["text", "lcov"]
coverageThreshold = 1.0
coverageSkipTestFiles = true
coveragePathIgnorePatterns = ["test/**", ".wxt/**", "entrypoints/lib/convex-sync.ts"]
[install]
# Configure package manager settings
cache = false
registry = "https://registry.npmjs.org"
